<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio 7 - tabela</title>
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>
    <header>
        <h1>Criando uma tabela</h1>
    </header>
    <table>
        <thead>
            <tr>
                <td class="ranking"></td>
                <th>Estado</th>
                <th>População</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="ranking">1</td>
                <td>São Paulo</td>
                <td>46 081 801</td>
            </tr>
            <tr>
                <td class="ranking">2</td>
                <td>Minas Gerais</td>
                <td>21 393 441</td>
            </tr>
            <tr>
                <td class="ranking">3</td>
                <td>Rio de Janeiro</td>
                <td>17 223 547</td>
            </tr>
            <tr>
                <td class="ranking">4</td>
                <td>Bahia</td>
                <td>14 870 907</td>
            </tr>
            <tr>
                <td class="ranking">5</td>
                <td>Paraná</td>
                <td>11 890 517</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td class="ranking"></td>
                <th class="ranking">total de habitantes</th>
                <td class="ranking"><strong>46.081.801</strong></td>
            </tr>
        </tfoot>
    </table>
</body>

</html>
