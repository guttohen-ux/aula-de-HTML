<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulário</title>
  </head>
  <body>
    <head>
        <h1>Criando Formulário e cia</h1>
    </head>
    <form autocomplete="on" id="formUser">
      <p>
          <label for="inome">Nome de Usuário</label>
          <input
            type="text"
            name="nome de usuario"
            id="inome"
            required
            minlength="5"
            maxlength="30"
            placeholder="Nome de usuario"
            size=" 30"
            autocomplete="name"
          />
      </p>
      <p>
        <label for="imedia">Média: </label>
        <input type="number" name="Média de algo" id="imedia" min="0" max="10" placeholder="0 a 10" step="0.1">
      </p>
      <p>
        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>
      </p>
      
    </form>
  </body>
</html>
